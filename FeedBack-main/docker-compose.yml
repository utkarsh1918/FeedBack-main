version: "3.9"
services:
  db:
    image: postgres:15
    container_name: feedback-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedback
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: feedback-backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: feedback-frontend
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    ports:
      - "5173:80"          # ✅ Host 5173 → container 80 (Nginx)
    # Remove volumes for production
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules

volumes:
  pgdata:
